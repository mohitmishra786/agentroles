<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'SF Mono','Menlo','Monaco','Consolas',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="yl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="rd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="800" height="340" fill="url(#bg)" rx="12"/>

  <!-- Static mode -->
  <text x="200" y="35" font-size="15" font-weight="700" fill="#e2e8f0" text-anchor="middle">Static (default)</text>
  <text x="200" y="52" font-size="11" fill="#64748b" text-anchor="middle">Generate configs · zero overhead · deterministic</text>

  <rect x="55" y="75" width="130" height="55" rx="8" fill="url(#gg)" filter="url(#shadow)" opacity="0.95"/>
  <text x="120" y="98" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">agentroles.yaml</text>
  <text x="120" y="115" font-size="9" fill="#d1fae5" text-anchor="middle">roles + models</text>

  <line x1="190" y1="102" x2="235" y2="102" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <rect x="245" y="75" width="130" height="55" rx="8" fill="url(#db)" filter="url(#shadow)" opacity="0.95"/>
  <text x="310" y="98" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">agentroles</text>
  <text x="310" y="115" font-size="9" fill="#bfdbfe" text-anchor="middle">build</text>

  <line x1="380" y1="102" x2="425" y2="102" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <rect x="435" y="65" width="150" height="75" rx="8" fill="url(#yl)" filter="url(#shadow)" opacity="0.95"/>
  <text x="510" y="88" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">Native tool</text>
  <text x="510" y="103" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">configs</text>
  <text x="510" y="122" font-size="9" fill="#fef3c7" text-anchor="middle">opencode.json</text>
  <text x="510" y="134" font-size="9" fill="#fef3c7" text-anchor="middle">.aider.conf.yml</text>

  <!-- Dynamic mode -->
  <text x="600" y="35" font-size="15" font-weight="700" fill="#e2e8f0" text-anchor="middle">Dynamic (opt-in)</text>
  <text x="600" y="52" font-size="11" fill="#64748b" text-anchor="middle">Signal-triggered escalation · cache-aware</text>

  <rect x="455" y="175" width="130" height="55" rx="8" fill="url(#gg)" filter="url(#shadow)" opacity="0.95"/>
  <text x="520" y="198" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">agentroles.yaml</text>
  <text x="520" y="215" font-size="9" fill="#d1fae5" text-anchor="middle">routing: dynamic</text>

  <line x1="590" y1="202" x2="635" y2="202" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <rect x="645" y="175" width="130" height="55" rx="8" fill="url(#rd)" filter="url(#shadow)" opacity="0.95"/>
  <text x="710" y="198" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">Escalation</text>
  <text x="710" y="215" font-size="9" fill="#fecaca" text-anchor="middle">runtime</text>

  <!-- Feedback loop arrow -->
  <path d="M 710 235 L 710 280 L 120 280 L 120 135" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowG)"/>
  <text x="415" y="295" font-size="9" fill="#10b981" text-anchor="middle" font-style="italic">test failure · low confidence → escalate to fallback model</text>

  <!-- Labels -->
  <text x="120" y="162" font-size="9" fill="#475569" text-anchor="middle">Single source of truth</text>
  <text x="310" y="162" font-size="9" fill="#475569" text-anchor="middle">Config compiler</text>
  <text x="510" y="162" font-size="9" fill="#475569" text-anchor="middle">Check into VCS · no runtime</text>

  <line x1="400" y1="62" x2="400" y2="163" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
</svg>