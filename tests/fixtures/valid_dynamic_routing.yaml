version: 1

roles:
  planner:
    primary: anthropic/claude-opus-4-8
    fallback: [openai/gpt-5.5]
  implementer:
    primary: anthropic/claude-haiku-4-5
    fallback: [openai/gpt-4o-mini]
  tester:
    primary: anthropic/claude-haiku-4-5

routing:
  mode: dynamic
  dynamic:
    enabled: true
    escalate_on: [test_failure, low_confidence, plan_revision]
    cache_aware: true

observability:
  cost_tracking: true
  tag_calls_with_role: true

targets:
  - litellm_proxy: ./litellm-config.yaml
