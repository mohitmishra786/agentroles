name: Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-typecheck:
    name: Python (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy pydantic pyyaml click
      - run: pip install -e .
      - run: mypy --ignore-missing-imports -p agentroles
        continue-on-error: true
