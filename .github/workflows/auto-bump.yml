name: Auto Bump Version

on:
  push:
    branches: [main]

jobs:
  bump:
    name: Bump Patch & Tag
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if tag already exists
        id: check
        run: |
          VERSION=$(grep -o '__version__ = "[^"]*"' agentroles/__init__.py | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — nothing to bump."
          else
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.check.outputs.needs_bump == 'true'
        run: |
          OLD=$(grep -o '__version__ = "[^"]*"' agentroles/__init__.py | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
          MAJOR=$(echo $OLD | cut -d. -f1)
          MINOR=$(echo $OLD | cut -d. -f2)
          NEW_PATCH=$(( $(echo $OLD | cut -d. -f3) + 1 ))
          NEW="$MAJOR.$MINOR.$NEW_PATCH"
          echo "Bumping $OLD → $NEW"

          sed -i "s/__version__ = \"$OLD\"/__version__ = \"$NEW\"/" agentroles/__init__.py
          sed -i "s/version = \"$OLD\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/\"version\": \"$OLD\"/\"version\": \"$NEW\"/" npm/package.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agentroles/__init__.py pyproject.toml npm/package.json
          git commit -m "chore: bump version to v$NEW [skip ci]"
          git tag "v$NEW"
          git push --atomic origin main "v$NEW"
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
