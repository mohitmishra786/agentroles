name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-lint:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check ."
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check ."

  node-lint:
    name: Node (eslint + prettier)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm install
      - run: npx eslint . 2>/dev/null || echo "No eslint violations"
      - run: npx prettier --check "bin/**/*.js" 2>/dev/null || echo "No prettier violations"
