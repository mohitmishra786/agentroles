name: Stale

on:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 180
          days-before-issue-close: 30
          days-before-pr-stale: 90
          days-before-pr-close: 14
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 30 days if no further activity occurs.
            Feel free to comment if this is still relevant.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had recent activity. It will be closed in 14 days if no further
            activity occurs.
          close-issue-message: "Closing due to inactivity. Please reopen if this is still relevant."
          close-pr-message: "Closing due to inactivity."
          exempt-issue-labels: "pinned,security,documentation"
          exempt-pr-labels: "pinned,security"
