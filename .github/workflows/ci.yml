name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -v --tb=short

  test-node:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ["20", "22"]
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4

      - name: Verify Node engine requirement
        run: |
          REQUIRED=$(node -e "console.log(require('./package.json').engines.node)")
          CURRENT=$(node -v)
          echo "Node $CURRENT (engines requires $REQUIRED)"

      - name: Install dependencies
        run: npm install --ignore-scripts 2>/dev/null || true

      - name: Verify package can be installed
        run: node -e "const pkg = require('./package.json'); console.log(pkg.name + '@' + pkg.version);"

      - name: Verify wrapper script syntax
        run: node -c bin/agentroles.js

  verify-package:
    name: Verify package metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build package
        run: python -m build --sdist --wheel

      - name: Check metadata
        run: python -m twine check dist/*
