name: Feature Request
description: Suggest an idea for agentroles
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: textarea
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear description of what the problem is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the solution you'd like
      description: A clear description of what you want to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Would this require changes to the agentroles.yaml schema?
      description: If yes, describe the proposed schema changes.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context about the feature request here.
    validations:
      required: false
