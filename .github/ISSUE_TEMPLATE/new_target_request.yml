name: New Target Request
description: Request support for a new agentic coding tool
title: "[New Target] "
labels: ["new-target"]
assignees: []
body:
  - type: input
    attributes:
      label: Tool name
      description: The name of the tool you want agentroles to support.
    validations:
      required: true
  - type: input
    attributes:
      label: Tool URL
      description: Link to the tool's website or GitHub repository.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Why should agentroles support this tool?
      description: Explain why this tool is important for agentic coding workflows.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Config surface
      description: Does this tool have a config file (YAML/JSON/TOML), CLI flags, or environment variables for specifying which model to use? Provide details.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Can different models be assigned to different roles/tasks?
      description: If yes, describe how. If no, explain how a single-model mapping would still be useful.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Any known limitations?
      description: Does the tool have constraints on which models it can use (e.g., Anthropic-only, specific formats, max N model slots)?
    validations:
      required: false
